---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: mix
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 1
    groups:
      prod:
        dependency-type: production
      dev:
        dependency-type: development
