name: Mix Dependencies
description: >
  Restores deps and _build from cache, installs dependencies, compiles them,
  then immediately saves the cache. The cache is saved right after this step,
  not at the end of the workflow, so dependencies are cached even when a later
  step fails. Useful when iterating on a CI pipeline, as you avoid recompiling
  on every run.

inputs:
  otp-version:
    description: Erlang/OTP version, typically from the outputs of setup-beam.
    required: true
  elixir-version:
    description: Elixir version, typically from the outputs of setup-beam.
    required: true
  cache-version:
    description: Cache key prefix. Bump this to invalidate the cache.
    required: false
    default: "v1"

runs:
  using: composite
  steps:
    - name: Restore dependencies cache
      uses: actions/cache/restore@v5
      with:
        path: |
          deps
          _build
        key: ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ hashFiles('mix.exs', 'mix.lock') }}
        restore-keys: |
          ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--
          ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--

    - name: Install Dependencies
      shell: bash
      run: |
        mix local.rebar --force
        mix local.hex --force
        mix deps.get --check-locked

    - name: Compile Dependencies
      shell: bash
      run: mix deps.compile

    - name: Save dependencies cache
      uses: actions/cache/save@v5
      with:
        path: |
          deps
          _build
        key: ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ hashFiles('mix.exs', 'mix.lock') }}
