name: Run Dialyzer
description: >
  Restores the Dialyzer PLT from cache, runs mix dialyzer, then immediately
  saves the PLT cache. The cache is saved right after this step, not at the end
  of the workflow, so the PLT is available on the next run regardless of whether
  later steps succeed. This can save a lot of time because PLT generation can
  take several minutes.

inputs:
  otp-version:
    description: Erlang/OTP version, typically from the outputs of setup-beam.
    required: true
  elixir-version:
    description: Elixir version, typically from the outputs of setup-beam.
    required: true
  cache-version:
    description: Cache key prefix. Bump this to invalidate the cache.
    required: false
    default: "v1"
  plt-path:
    description: Directory where Dialyzer stores PLT files.
    required: false
    default: "_build/plts"

runs:
  using: composite
  steps:
    - name: Restore PLT cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ inputs.plt-path }}
        key: ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ hashFiles('mix.exs', 'mix.lock') }}
        restore-keys: |
          ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--
          ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--

    - name: Run dialyzer
      shell: bash
      run: mix dialyzer --halt-exit-status

    - name: Save PLT cache
      uses: actions/cache/save@v5
      with:
        path: ${{ inputs.plt-path }}
        key: ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ hashFiles('mix.exs', 'mix.lock') }}
