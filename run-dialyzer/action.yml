name: Run Dialyzer
description: Restore PLT cache and run mix dialyzer

inputs:
  otp-version:
    description: Erlang/OTP version (from setup-beam outputs)
    required: true
  elixir-version:
    description: Elixir version (from setup-beam outputs)
    required: true
  cache-version:
    description: Cache version prefix
    required: false
    default: "v1"

runs:
  using: composite
  steps:
    - name: Restore PLT cache
      uses: actions/cache/restore@v5
      with:
        path: _build/plts
        key: ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ hashFiles('mix.exs', 'mix.lock') }}
        restore-keys: |
          ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--
          ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--

    - name: Run dialyzer
      shell: bash
      run: mix dialyzer --halt-exit-status

    - name: Save PLT cache
      uses: actions/cache/save@v5
      with:
        path: _build/plts
        key: ${{ inputs.cache-version }}-dialyzer-plts-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ hashFiles('mix.exs', 'mix.lock') }}
