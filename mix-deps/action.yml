name: Mix Dependencies
description: >
  Restores deps and _build from cache, installs dependencies, compiles them,
  then immediately saves the cache. The cache is saved right after this step,
  not at the end of the workflow, so dependencies are cached even when a later
  step fails. Useful when iterating on a CI pipeline, as you avoid recompiling
  on every run.

inputs:
  otp-version:
    description: Erlang/OTP version, typically from the outputs of setup-beam.
    required: true
  elixir-version:
    description: Elixir version, typically from the outputs of setup-beam.
    required: true
  cache-version:
    description: Cache key prefix. Bump this to invalidate the cache.
    required: false
    default: "v1"
  compile-envs:
    description: >
      Optional whitespace-separated list of MIX_ENV values to compile dependencies
      for (e.g. "dev test"). If omitted or empty, runs a single `mix deps.compile`
      with whatever MIX_ENV is already set in the environment.
    required: false

runs:
  using: composite
  steps:
    - name: Normalize compile-envs for cache key
      id: cache-envs
      shell: bash
      run: |
        normalized=$(echo '${{ inputs.compile-envs }}' | tr -s '[:space:]' '-' | sed 's/^-//;s/-$//')
        echo "value=$normalized" >> "$GITHUB_OUTPUT"

    - name: Restore dependencies cache
      uses: actions/cache/restore@v5
      with:
        path: |
          deps
          _build
        key: ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ steps.cache-envs.outputs.value }}--${{ hashFiles('mix.exs', 'mix.lock') }}
        restore-keys: |
          ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ steps.cache-envs.outputs.value }}--
          ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--
          ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--

    - name: Install Dependencies
      shell: bash
      run: |
        mix local.rebar --force
        mix local.hex --force
        mix deps.get --check-locked

    - name: Compile Dependencies
      shell: bash
      run: |
        envs='${{ inputs.compile-envs }}'
        if [ -z "$envs" ]; then
          mix deps.compile
        else
          for env in $envs; do
            MIX_ENV="$env" mix deps.compile
          done
        fi

    - name: Save dependencies cache
      uses: actions/cache/save@v5
      with:
        path: |
          deps
          _build
        key: ${{ inputs.cache-version }}-deps-build-${{ runner.os }}--${{ inputs.otp-version }}--${{ inputs.elixir-version }}--${{ steps.cache-envs.outputs.value }}--${{ hashFiles('mix.exs', 'mix.lock') }}
